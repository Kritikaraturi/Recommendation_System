<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Result</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
       body {
                font-family: 'Poppins', sans-serif;
                margin: 0;

                /*  Smooth modern gradient */
                background: linear-gradient(135deg, #151e32, #391e8a, #312e81);
                color: white;

                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            /* Container */
            .container {
                margin: 40px 0;
                width: 90%;
                max-width: 1000px;
                padding: 30px;

                /*  Glass effect */
                background: rgba(255, 255, 255, 0.05);
                border-radius: 20px;
                backdrop-filter: blur(15px);

                border: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            }

            /* Heading */
            h1 {
                text-align: center;
                font-size: 34px;
                margin-bottom: 10px;
                letter-spacing: 1px;
            }

            /* Career Highlight */
            .career {
                text-align: center;
                font-size: 32px;
                font-weight: 700;
                color: #ffd60a;
                margin-bottom: 30px;
                text-shadow: 0 0 15px rgba(255, 214, 10, 0.6);
            }

            /* Cards */
            .card {
                background: rgba(255, 255, 255, 0.07);
                padding: 22px;
                border-radius: 18px;
                margin-top: 20px;

                backdrop-filter: blur(12px);
                border: 1px solid rgba(255,255,255,0.15);

                transition: all 0.3s ease;
                text-align: center;
            }

            /* Hover effect */
            .card:hover {
                transform: translateY(-8px);
                box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            }

            /* Grid */
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 25px;
            }

            /* Description */
            #description {
                text-align: center;
                font-size: 16px;
                line-height: 1.7;
                color: #e2e8f0;
            }

            /* Roadmap */
            #roadmap {
                text-align: center;
                line-height: 1.9;
                color: #cbd5f5;
            }
         

            .video-card:hover {
                transform: scale(1.04);
            }

            /* Video */
            .video-card iframe {
                width: 100%;
                height: 200px;
                border-radius: 10px;
            }

            /* Title */
            .video-title {
                margin-top: 10px;
                font-size: 14px;
                color: #d1d5db;
            }

            /* Links (UNCHANGED HOVER ✅) */
            a {
                display: block;
                width: 75%;
                margin: 10px auto;
                text-decoration: none;
                color: white;
                background: rgba(14, 13, 19, 0.321);
                padding: 14px 10px;
                border-radius: 10px;
                transition: 0.3s;
            }

            /* ❌ Hover NOT changed (as you said) */
            a:hover {
                background: linear-gradient(45deg, #416aff, #ff4b2b);
                transform: scale(1.05);
            }

            /* Button */
            .btn {
                display: block;
                margin: 40px auto;
                padding: 14px 35px;
                border-radius: 30px;
                border: none;

                background: linear-gradient(45deg, #06b6d4, #3b82f6);
                color: white;

                font-size: 16px;
                cursor: pointer;

                transition: 0.3s;
                box-shadow: 0 5px 20px rgba(59, 130, 246, 0.5);
            }

            .btn:hover {
                transform: scale(1.08);
                box-shadow: 0 10px 30px rgba(59, 130, 246, 0.7);
            }

            .carousel-wrapper {
                position: relative;
                display: flex;
                align-items: center;
                width: 100%;
            }

            .carousel {
                overflow: hidden;
                width: 100%;
            }

            .carousel-track {
                display: flex;
                gap: 15px;
                overflow-x: auto;
                scroll-behavior: smooth;
                padding: 10px;
                scroll-snap-type: x mandatory;
                width: 100%;
            }

            .carousel-track::-webkit-scrollbar {
                display: none;
            }

            /* video card */
            .video-card {
                min-width: 300px;
                max-width: 300px;
                flex: 0 0 auto;
                scroll-snap-align: start;
                background: rgba(0,0,0,0.35);
                padding: 12px;
                border-radius: 12px;
                transition: 0.3s;
            }

            /* BUTTONS (OUTSIDE feel) */
            .nav {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                z-index: 10;

                background: rgba(0,0,0,0.4);
                border: none;
                color: white;

                width: 45px;
                height: 45px;
                border-radius: 50%;
                cursor: pointer;
            }

            /* Hover effect */
            .nav:hover {
                background: linear-gradient(45deg, #3b82f6, #06b6d4);
                transform: translateY(-50%) scale(1.1);
            }

            .left {
                position: absolute;
                left: 10px;
                z-index: 20;
            }

            .right {
                position: absolute;
                right: 10px;
                z-index: 20;
            }
    </style>
    </head>

        <body>

        <div class="container">

        <h1>Your Career Suggestion</h1>
        <div class="career" id="career"></div>

        <div class="card">
            <h2>📖 Description</h2>
            <div id="description"></div>
        </div>

        <div class="card">
            <h2>🛣️ Roadmap</h2>
            <div id="roadmap"></div>
        </div>

        <div class="card">
            <h2>🌐 Learning Websites</h2>
            <div id="websites"></div>
        </div>

       <div class="card">
        <h2>🎥 Videos (watch here)</h2>

            <div class="carousel-wrapper">
                <button class="nav left" onclick="scrollVideosLeft(-320)">❮</button>

                <div class="carousel">
                    <div id="videos" class="carousel-track"></div>
                </div>

                <button class="nav right" onclick="scrollVideosRight(320)">❯</button>
            </div>

        </div>

        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 30px;">
            <button class="btn" onclick="viewDetailPage()">📊 View Detailed Career Analysis</button>
            <!-- <button class="btn" onclick="goHome()">Back to Home</button> -->
        </div>

        </div>

        <script>

            // ==========================
            // LOAD DATA
            // ==========================
            const data = JSON.parse(localStorage.getItem("careerResults"));

            if (!data) {
                alert("No data found!");
                window.location.href = "quiz.html";
            }

            // show career
            document.getElementById("career").innerText = data.career;

            // description
            document.getElementById("description").innerText = data.description;

            // roadmap
            let roadmapHTML = "";
            data.roadmap.forEach(step => {
                roadmapHTML += "✔ " + step + "<br>";
            });
            document.getElementById("roadmap").innerHTML = roadmapHTML;


            // ==========================
            // LOAD VIDEOS FROM BACKEND
            // ==========================
            loadVideos(data.career);

            async function loadVideos(career) {

                let res = await fetch("http://127.0.0.1:5000/get-resources", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({career: career})
                });

                let result = await res.json();

                // =======================
                // 🎥 VIDEOS
                // =======================
                const videoContainer = document.getElementById("videos");
                videoContainer.innerHTML = "";

                if (result.videos && result.videos.length > 0) {

                    result.videos.forEach(v => {

                        let videoId = v.videoId || v.link?.split("v=")[1];

                        let div = document.createElement("div");
                        div.classList.add("video-card");

                        div.innerHTML = `
                            <iframe 
                                src="https://www.youtube.com/embed/${videoId}" 
                                frameborder="0" 
                                allowfullscreen>
                            </iframe>
                            <div class="video-title">${v.title}</div>
                        `;

                        videoContainer.appendChild(div);
                    });

                } else {
                    videoContainer.innerHTML = "No videos found";
                }


                // =======================
                // 🌐 WEBSITES (NEW ADD)
                // =======================
                const websiteContainer = document.getElementById("websites");
                websiteContainer.innerHTML = "";

                if (result.websites && result.websites.length > 0) {

                    result.websites.forEach(w => {

                        let div = document.createElement("div");

                        div.innerHTML = `
                            <a href="${w.link}" target="_blank">
                                ${w.name}
                            </a>
                        `;

                        websiteContainer.appendChild(div);
                    });

                } else {
                    websiteContainer.innerHTML = "No websites found";
                }
            }

            function scrollVideosLeft() {
                const track = document.getElementById("videos");
                track.scrollBy({ left: -320, behavior: "smooth" });
            }

            function scrollVideosRight() {
                const track = document.getElementById("videos");
                track.scrollBy({ left: 320, behavior: "smooth" });
            }
            // ==========================
            // BACK BUTTON
            // ==========================

            function viewDetailPage() {
                const data = JSON.parse(localStorage.getItem("careerResults"));
                if (!data) {
                    alert("No career data found!");
                    return;
                }
                // Simple encode - special characters handle karne ke liye
                const careerEncoded = encodeURIComponent(data.career);
                window.location.href = `http://127.0.0.1:5000/career/${careerEncoded}`;
            }
            // function goHome() {
            //     window.location.href = "index.html";
            // }

        </script>

    </body>
</html>
